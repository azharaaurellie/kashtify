name: kashtify3
description: "Aplikasi kas kelas Flutter dengan dua role: siswa dan bendahara."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  file_picker:
    path: third_party/file_picker

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/qris.png
